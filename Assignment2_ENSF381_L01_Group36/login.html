<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ice Cream Shop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="login-sign-up-page">
    <header>
      <img src="logo.jpeg" alt="Shop Logo" width="100" />
      <h1>Sweet Scoop Ice Cream</h1>
    </header>

    <div>
      <nav>
        <a href="index.html">Home</a>
      </nav>
    </div>

    <main class="login-form">
      <form>
        <h2>Welcome Back!</h2>
        <label for="name">Username:</label><br />
        <input type="text" id="name" name="name" required /><br /><br />

        <label for="password">Password:</label><br />
        <input type="password" id="password" name="password" required /><br />
        <br />
        <input type="checkbox" id="forgot" name="forgot" />
        <label for="forgot">Forgot Password</label>
        <br />
        <br />
        <a class="login" id="login" href="menu_view.html">Login</a><br />
        <div class="sign-up">
          <p>New User?</p>
          <a class="new-user" href="signup.html">Create an account</a>
        </div>
      </form>
      <p id="error-message"></p>
    </main>

    <footer>
      <p>&copy; 2026 Sweet Scoop Ice Cream. All rights reserved.</p>
    </footer>

    <script>
      async function checkLogin(event) {
        event.preventDefault();
        let userData;

        try {
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/users",
          );
          if (!response.ok) {
            throw new Error("Network response was not ok");
          }
          userData = await response.json();
          console.log(userData);
        } catch (error) {
          console.error("Error fetching user data:", error);
          return;
        }

        const username = document.getElementById("name").value;
        const password = document.getElementById("password").value;

        const user = userData.find((user) => user.username === username);

        const messageBox = document.getElementById("error-message");
        if (user && password === user.email) {
          console.log("Login successful");
          messageBox.textContent = "Login successful!";
          messageBox.className = "error-box success";
          setTimeout(() => {
            window.location.href = "menu_view.html";
          }, 2000);
        } else {
          console.log("Login failed");
          messageBox.textContent = "Invalid username or password";
          messageBox.className = "error-box error";
        }
      }
      document.getElementById("login").addEventListener("click", checkLogin);
    </script>
  </body>
</html>
