<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ice Cream Shop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <img src="logo.jpeg" alt="Shop Logo" width="100" />
      <h1>Sweet Scoop Ice Cream</h1>
    </header>

    <div>
      <nav>
        <a href="index.html">Home</a> |
        <a href="menu_view.html">Menu</a>
      </nav>
    </div>

    <main>
      <h2 id="timer-display">Order Time Left: 10:00</h2>
      <form onclick="validate()">
        <img src="Picture2.jpeg" width="250px" height="auto" />
        <h2>Vanilla Dream</h2>
        <h3>Choose Type</h3>
        <input type="radio" id="cup" name="type" value="cup" /><br />
        <label for="cup">Cup</label><br />

        <input type="radio" id="cone" name="type" value="cone" /><br />
        <label for="cone">Cone</label><br /><br />

        <h2>Chocolate Bliss</h2>
        <h3>Select Toppings</h3>

        <input
          type="checkbox"
          id="sprinkles"
          name="toppings"
          value="sprinkles"
        /><br />
        <label for="sprinkles">Sprinkles</label><br />

        <input type="checkbox" id="nuts" name="toppings" value="nuts" /><br />
        <label for="nuts">Nuts</label><br />

        <input
          type="checkbox"
          id="caramel"
          name="toppings"
          value="caramel"
        /><br />
        <label for="caramel">Caramel</label><br />
        <br />
        <p id="price-tag"></p>
        <a class="finish-order" href="order_summary.html">Finish Order</a>
      </form>
    </main>
    <footer>
      <p>&copy; 2026 Sweet Scoop Ice Cream. All rights reserved.</p>
    </footer>
    <script>
      let timerInterval;
      let timeRemaining = 600;

      function startTimer() {
        clearInterval(timerInterval);

        const displayElement = document.getElementById("timer-display");
        updateDisplay(timeRemaining, displayElement);

        timerInterval = setInterval(() => {
          timeRemaining--;
          updateDisplay(timeRemaining, displayElement);

          if (timeRemaining <= 0) {
            clearInterval(timerInterval);
            window.location.href = "order_summary.html";
          }
        }, 1000);
      }

      function updateDisplay(time, element) {
        const minutes = Math.floor(time / 60);
        let seconds = time % 60;

        seconds = seconds < 10 ? "0" + seconds : seconds;
        element.textContent = `Order Time Left: ${minutes}:${seconds}`;
      }

      function validate() {
        const cup = document.getElementById("cup");
        const cone = document.getElementById("cone");

        const sprinkles = document.getElementById("sprinkles");
        const nuts = document.getElementById("nuts");
        const caramel = document.getElementById("caramel");

        const priceTag = document.getElementById("price-tag");

        const baseSelected = cup.checked || cone.checked;
        const toppingSelected =
          sprinkles.checked || nuts.checked || caramel.checked;

        if (!baseSelected) {
          alert("Please select a base flavor.");
          return false;
        }

        if (!toppingSelected) {
          alert("Please select at least one topping.");
          return false;
        }

        let price = 6.0;

        if (sprinkles.checked) price += 1.5;
        if (nuts.checked) price += 1.5;
        if (caramel.checked) price += 1.5;

        priceTag.textContent = `Total Price: $${price.toFixed(2)}`;

        
        return false;
      }

      startTimer();
    </script>
  </body>
</html>
